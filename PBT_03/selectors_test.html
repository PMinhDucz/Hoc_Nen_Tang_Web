<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kiểm chứng CSS Selectors - A2</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            padding: 20px;
            background: #f4f4f4;
        }

        #app {
            background: white;
            border: 2px solid #ccc;
            padding: 20px;
            max-width: 600px;
            margin: 0 auto;
        }


        h1 {
            outline: 3px solid green;
        }

        .price {
            background-color: yellow;
            font-weight: bold;
        }

        #app header {
            border: 2px dashed black;
            padding: 10px;
        }

        nav a:first-child {
            color: red;
            font-weight: bold;
            font-size: 20px;
        }

        .product.featured h2 {
            text-decoration: underline double red;
        }

        article>p {
            font-style: italic;
            border-left: 4px solid purple;
            padding-left: 10px;
        }

        a[href="/"] {
            background-color: lightblue;
        }

        .top-bar.dark h1 {
            color: orange;
        }

        nav a {
            margin-right: 15px;
            text-decoration: none;
            color: #333;
        }

        article {
            border: 1px solid #ddd;
            padding: 15px;
            margin-top: 15px;
        }
    </style>
</head>

<body>

    <p style="text-align: center; color: red;"><em>*Ghi chú: Các thẻ bị áp dụng CSS có viền/màu khác biệt là chứng minh
            cho đáp án Câu A2</em></p>

    <div id="app">
        <header class="top-bar dark">
            <h1>ShopTLU</h1>
            <nav>
                <a href="/" class="active">Home</a>
                <a href="/products">Products</a>
                <a href="/about">About</a>
            </nav>
        </header>
        <main>
            <article class="product">
                <h2>iPhone 16</h2>
                <p class="price">25.990.000đ</p>
                <p>Mô tả sản phẩm...</p>
            </article>
            <article class="product featured">
                <h2>MacBook Pro</h2>
                <p class="price">45.990.000đ</p>
                <p>Mô tả sản phẩm...</p>
            </article>
        </main>
    </div>

</body>

</html>
